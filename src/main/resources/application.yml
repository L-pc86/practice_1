spring:
  application:
    name: demo-test1

  datasource:
    url: jdbc:mysql://localhost:3306/mp_test?useSSL=false&serverTimezone=UTC
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

  # Redis配置：安装Redis后取消注释即可启用
  # data:
  #   redis:
  #     host: localhost
  #     port: 6379
  #     password:
  #     database: 0


mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

server:
  port: 8082
  servlet:
    context-path: /test1

sky:
  upload:
    path: upload/


springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha